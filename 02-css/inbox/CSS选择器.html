<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CSS选择器</title>
	<style>
		/* 1.1类型选择器/标签选择器 */
		div {
			color: black;
			font-size: 20px;
		}

		/* 1.2类选择器 */
		.red {
			color: red;
		}

		.onther {
			color: blue;
		}
	</style>
</head>

<body>
	<!-- 选择器是什么？
	CSS选择器是CSS规则的第一部分。它是选择 HTML元素的方式。 

	CSS属性：
		采取 键值对 形式。 属性名:属性值;
	CSS层叠性：
		CSS规则可以同时作用于一个元素，浏览器通过特定规则决定最终生效的样式。层叠性解决了样式冲突问题。
		- 原则：后定义的样式覆盖先前的样式（就近原则）

	选择器的分类:
			根据使用场景的不同，选择器也分不同类型。
			1.基础选择器
			-类型选择器
			- 类选择器
			- id选择器
			- 通配符选择器

	书写范式：
			1. 选择器和大括号中间保留1个空格距离。
			2. 属性名和属性值中间也要保留1个空格。
			3. 每个CSS属性单独占一行。后期打包压缩无需担心体积问题。
			4. 也可以通过格式化代码或AI工具来优化代码。

			p {
				/* 注释左右预留1个空格 */
				color: black;
				font-size: 20px;
			}
-->
	<!-- 1.1 类型选择器
			类型选择器选择某个类型的元素，也称为标签选择器。
	-->
	<div>
		<p>一个人的坚持到底有多难</p>
	</div>
	<!-- 1.2 类选择器
		类选择器选择某1个元素或者多个元素。

				CSS部分：
				<style>
					.类名 {
						color: pink;
					}
				</style>
				html部分：

				<p class="类名"> 坚持 </p>
		谁需要，设置谁，直接利用优先级覆盖掉类选择器的设置，类选择器 > 类型选择器
		注意：
			1. 类名自定义，不能是中文、纯数字。
			2. 多个英文单词组成尽量使用 “-”链接。
			3. 命名要有意义，尽量简明知义。
			4. class属性可以有多类名中间用空格隔开。
		-->
	<div>
		<p class="red">我想看到这个笔记的人，都能回答这个问题</p>
		<p class="red onther">逆流河上不回头，debug 路上不罢休。</p>
	</div>
	<!-- 1.3 id选择器


	-->
	<div>
		<P></P>
	</div>
</body>

</html>
