<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的第一个网页</title>
  <style>
    .demo-section {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      background-color: #fafafa;
    }
  </style>
</head>

<body>

  <h1>Hello, World!</h1>

  <!-- ============================================
       1. HTML 基础结构
       ============================================ -->
  <section class="demo-section">
    <h2>1. HTML 基础结构</h2>

    <!-- h1：一级标题，页面主标题，一个页面建议只有一个 -->
    <h1>Hello, World!</h1>

    <!-- p：段落标签，用于正文内容 -->
    <p>这是我的第一个网页</p>
  </section>

</body>

</html>
