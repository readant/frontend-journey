<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS边框</title>
    <style>
        .box {
            width: 200px;
            height: 100px;
            border: 2px solid black;
            /* 设置边框样式 */
            border-radius: 10px;
            /* 设置圆角 */
            margin: 20px;
            /* 设置外边距 */
            padding: 10px;
            /* 设置内边距 */
            background-color: #f0f0f0;
            /* 设置背景颜色 */
        }
    </style>
</head>

<body>
    /* CSS边框 */
    <div class="box">
        <p>这是一个带有边框的盒子。</p>
    </div>

</body>

</html>
