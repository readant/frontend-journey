<!-- 
  ============================================
  HTML5 完整文档结构
  ============================================
  这是一个标准的HTML5文档模板，包含了所有必要的部分
  
  学习要点：
  1. DOCTYPE声明
  2. html根元素
  3. head元数据区
  4. body内容区
-->

<!-- DOCTYPE声明：告诉浏览器使用HTML5标准解析 -->
<!DOCTYPE html>

<!-- html标签：整个文档的根元素
     lang属性：指定文档语言，有助于SEO和无障碍访问
     zh-CN表示简体中文 -->
<html lang="zh-CN">

<!-- head标签：包含元数据（用户不可见，但浏览器和搜索引擎需要） -->
<head>
    <!-- meta标签：字符集声明，UTF-8是国际通用编码 -->
     <!--对于中文网页需要使用<meta charset = "utf-8">声明编码，否则会出现乱码
     有些浏览器（如360浏览器，大概吧）会设置默认GBK为默认编码，则需要设置为<meta charset="gdk"> >-->
    <meta charset="UTF-8">

    <!-- viewport设置：移动端适配必备 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 页面描述：搜索引擎会显示这个描述 -->
    <meta name="description" content="HTML文档结构学习示例">

    <!-- 页面作者 -->
    <meta name="author" content="你的名字">

    <!-- 页面关键词（SEO用） -->
    <meta name="keywords" content="HTML,学习,前端">

    <!-- title标签：页面标题，显示在浏览器标签页 -->
    <title>HTML文档结构详解</title>

    <!-- link标签：引入外部CSS样式表 -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- favicon：网站小图标，显示在标签页 -->
    <link rel="icon" href="../assets/favicon.ico">

    <!-- script标签：引入JavaScript（建议放在body底部） -->
    <!-- <script src="../js/script.js"></script> -->
</head>

<!-- body标签：包含所有可见的页面内容 -->
<body>
    <!-- 
      页面内容都放在这里
      用户看到的所有内容都在这里
    -->

    <header>
        <h1>页面头部</h1>
        <nav>
            <a href="#">导航链接1</a>
            <a href="#">导航链接2</a>
        </nav>
    </header>

    <main>
        <article>
            <h2>主要内容区域</h2>
            <p>这里是页面的主要内容...</p>
        </article>
    </main>

    <footer>
        <p>页脚信息 © 2026</p>
    </footer>

    <!-- script标签：建议放在body底部，避免阻塞页面渲染 -->
    <script src="../js/script.js"></script>
</body>

</html>
