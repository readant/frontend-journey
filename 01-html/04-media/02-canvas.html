<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas绘图</title>
    <style>
        .demo-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        canvas {
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
    </style>
</head>
<body>

    <h1>HTML5 Canvas 绘图示例</h1>

    <p>注意：Canvas 需要配合 JavaScript 才能绘图，这里只是简单演示</p>

    <!-- ============================================
         1. Canvas 基础
         ============================================ -->
    <section class="demo-section">
        <h2>1. Canvas 基础绘制</h2>

        <canvas id="canvas1" width="400" height="200"></canvas>

        <script>
            // 获取canvas元素
            const canvas1 = document.getElementById('canvas1');
            // 获取绘图上下文（2d绘图）
            const ctx1 = canvas1.getContext('2d');

            // 绘制红色矩形
            ctx1.fillStyle = '#ff0000';
            ctx1.fillRect(10, 10, 100, 80);

            // 绘制蓝色边框矩形
            ctx1.strokeStyle = '#0000ff';
            ctx1.lineWidth = 3;
            ctx1.strokeRect(130, 10, 100, 80);

            // 绘制圆形
            ctx1.beginPath();
            ctx1.arc(300, 50, 40, 0, Math.PI * 2);
            ctx1.fillStyle = '#00ff00';
            ctx1.fill();

            // 绘制文本
            ctx1.font = '20px Arial';
            ctx1.fillStyle = '#333';
            ctx1.fillText('Hello Canvas!', 10, 150);
        </script>
    </section>

    <!-- ============================================
         2. Canvas 路径绘制
         ============================================ -->
    <section class="demo-section">
        <h2>2. 路径绘制</h2>

        <canvas id="canvas2" width="400" height="200"></canvas>

        <script>
            const canvas2 = document.getElementById('canvas2');
            const ctx2 = canvas2.getContext('2d');

            // 绘制三角形
            ctx2.beginPath();
            ctx2.moveTo(50, 150);    // 移动起点
            ctx2.lineTo(150, 50);    // 画线到
            ctx2.lineTo(250, 150);   // 画线到
            ctx2.closePath();         // 闭合路径
            ctx2.strokeStyle = '#9400d3';
            ctx2.lineWidth = 5;
            ctx2.stroke();            // 绘制边框
            ctx2.fillStyle = '#dda0dd';
            ctx2.fill();              // 填充

            // 绘制笑脸
            ctx2.beginPath();
            ctx2.arc(320, 100, 40, 0, Math.PI * 2);  // 脸
            ctx2.stroke();

            ctx2.beginPath();
            ctx2.arc(305, 90, 5, 0, Math.PI * 2);  // 左眼
            ctx2.fill();

            ctx2.beginPath();
            ctx2.arc(335, 90, 5, 0, Math.PI * 2);  // 右眼
            ctx2.fill();

            ctx2.beginPath();
            ctx2.arc(320, 100, 25, 0, Math.PI);  // 嘴
            ctx2.stroke();
        </script>
    </section>

    <!-- ============================================
         3. 渐变绘制
         ============================================ -->
    <section class="demo-section">
        <h2>3. 渐变绘制</h2>

        <canvas id="canvas3" width="400" height="150"></canvas>

        <script>
            const canvas3 = document.getElementById('canvas3');
            const ctx3 = canvas3.getContext('2d');

            // 线性渐变
            const linearGrad = ctx3.createLinearGradient(0, 0, 400, 0);
            linearGrad.addColorStop(0, '#ff0000');
            linearGrad.addColorStop(0.5, '#ffff00');
            linearGrad.addColorStop(1, '#00ff00');
            ctx3.fillStyle = linearGrad;
            ctx3.fillRect(10, 10, 380, 50);

            // 径向渐变
            const radialGrad = ctx3.createRadialGradient(200, 120, 10, 200, 120, 80);
            radialGrad.addColorStop(0, '#00ffff');
            radialGrad.addColorStop(1, '#0000ff');
            ctx3.fillStyle = radialGrad;
            ctx3.beginPath();
            ctx3.arc(200, 120, 50, 0, Math.PI * 2);
            ctx3.fill();
        </script>
    </section>

    <!-- ============================================
         4. 导出图片 toDataURL
         ============================================ -->
    <section class="demo-section">
        <h2>4. 导出图片 toDataURL()</h2>

        <canvas id="canvas4" width="200" height="100"></canvas>
        <button onclick="exportImage()">导出为图片</button>
        <img id="exportedImg" style="margin-top: 10px; border: 1px solid #ccc;">

        <script>
            const canvas4 = document.getElementById('canvas4');
            const ctx4 = canvas4.getContext('2d');
            ctx4.fillStyle = '#667eea';
            ctx4.fillRect(0, 0, 200, 100);
            ctx4.fillStyle = 'white';
            ctx4.font = '20px Arial';
            ctx4.fillText('导出示例', 50, 55);

            function exportImage() {
                const dataURL = canvas4.toDataURL('image/png');
                document.getElementById('exportedImg').src = dataURL;
            }
        </script>
    </section>

    <!-- ============================================
         5. 动画帧 requestAnimationFrame
         ============================================ -->
    <section class="demo-section">
        <h2>5. 动画帧 requestAnimationFrame</h2>

        <canvas id="canvas5" width="400" height="150"></canvas>
        <button onclick="startAnimation()">开始动画</button>
        <button onclick="stopAnimation()">停止</button>

        <script>
            const canvas5 = document.getElementById('canvas5');
            const ctx5 = canvas5.getContext('2d');
            let x = 0;
            let animId = null;

            function drawFrame() {
                ctx5.clearRect(0, 0, 400, 150);
                ctx5.fillStyle = '#667eea';
                ctx5.beginPath();
                ctx5.arc(x, 75, 20, 0, Math.PI * 2);
                ctx5.fill();

                x += 2;
                if (x > 420) x = 0;

                animId = requestAnimationFrame(drawFrame);
            }

            function startAnimation() {
                if (!animId) drawFrame();
            }

            function stopAnimation() {
                if (animId) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
            }
        </script>
    </section>

</body>
</html>
