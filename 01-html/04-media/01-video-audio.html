<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频和音频</title>
    <style>
        .demo-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        video, audio {
            width: 100%;
            max-width: 600px;
        }
        .attr-table {
            margin: 15px 0;
            border-collapse: collapse;
            width: 100%;
        }
        .attr-table th, .attr-table td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        .attr-table th {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <h1>HTML5 多媒体标签示例</h1>

    <!-- ============================================
         1. video：视频标签
         ============================================ -->
    <section class="demo-section">
        <h2>1. &lt;video&gt; 视频标签</h2>

        <h3>基础视频：</h3>
        <video controls>
            <!-- 支持多种格式，浏览器会选择支持的 -->
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            <source src="https://www.w3schools.com/html/mov_bbb.ogg" type="video/ogg">
            <!-- 浏览器不支持时显示 -->
            您的浏览器不支持 video 标签。
        </video>

        <h3>带属性的视频：</h3>
        <video controls autoplay muted loop width="600" poster="https://via.placeholder.com/600x338">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            您的浏览器不支持 video 标签。
        </video>

        <table class="attr-table">
            <caption>video标签常用属性</caption>
            <tr>
                <th>属性</th>
                <th>作用</th>
            </tr>
            <tr>
                <td><code>controls</code></td>
                <td>显示播放控件（播放、暂停、音量等）</td>
            </tr>
            <tr>
                <td><code>autoplay</code></td>
                <td>自动播放（通常需要配合muted）</td>
            </tr>
            <tr>
                <td><code>muted</code></td>
                <td>静音</td>
            </tr>
            <tr>
                <td><code>loop</code></td>
                <td>循环播放</td>
            </tr>
            <tr>
                <td><code>poster</code></td>
                <td>视频封面图</td>
            </tr>
            <tr>
                <td><code>width/height</code></td>
                <td>视频尺寸</td>
            </tr>
        </table>
    </section>

    <!-- ============================================
         2. audio：音频标签
         ============================================ -->
    <section class="demo-section">
        <h2>2. &lt;audio&gt; 音频标签</h2>

        <h3>基础音频：</h3>
        <audio controls>
            <source src="https://www.w3schools.com/html/horse.ogg" type="audio/ogg">
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            您的浏览器不支持 audio 标签。
        </audio>

        <h3>带属性的音频：</h3>
        <audio controls loop>
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            您的浏览器不支持 audio 标签。
        </audio>

        <table class="attr-table">
            <caption>audio标签常用属性（与video类似）</caption>
            <tr>
                <th>属性</th>
                <th>作用</th>
            </tr>
            <tr>
                <td><code>controls</code></td>
                <td>显示播放控件</td>
            </tr>
            <tr>
                <td><code>autoplay</code></td>
                <td>自动播放</td>
            </tr>
            <tr>
                <td><code>loop</code></td>
                <td>循环播放</td>
            </tr>
            <tr>
                <td><code>muted</code></td>
                <td>静音</td>
            </tr>
        </table>
    </section>

</body>
</html>
